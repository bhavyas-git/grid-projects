seed: 42

data:
  train_dir: "../data/raw/train"
  val_dir: "../data/raw/test"
  image_size: 48
  batch_size: 64
  num_workers: 4

model:
  name: "mobilenetv3_small_100"
  num_classes: 7
  dropout: 0.4
  pretrained: true

training:
  epochs: 10
  lr_backbone: 0.0001
  lr_head: 0.001
  weight_decay: 0.01
  label_smoothing: 0.1
  patience: 3

loss:
  type: "cross_entropy"
  focal_gamma: 2.0